<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3B82F6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bgGradient)" stroke="#1E40AF" stroke-width="2"/>
  
  <!-- Calendar icon background -->
  <rect x="20" y="32" width="88" height="72" rx="8" fill="white" stroke="#E5E7EB" stroke-width="2"/>
  
  <!-- Calendar header -->
  <rect x="20" y="32" width="88" height="20" rx="8" fill="#F3F4F6"/>
  <rect x="20" y="48" width="88" height="4" fill="#F3F4F6"/>
  
  <!-- Calendar binding rings -->
  <circle cx="36" cy="26" r="4" fill="#9CA3AF"/>
  <circle cx="92" cy="26" r="4" fill="#9CA3AF"/>
  <rect x="32" y="18" width="8" height="16" rx="4" fill="#9CA3AF"/>
  <rect x="88" y="18" width="8" height="16" rx="4" fill="#9CA3AF"/>
  
  <!-- Task checkboxes and text -->
  <g transform="translate(0, 8)">
    <!-- Completed task (green) -->
    <circle cx="32" cy="58" r="5" fill="#10B981" stroke="#059669" stroke-width="1"/>
    <path d="M28 58 L31 61 L36 55" stroke="white" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="44" y="55" width="32" height="3" fill="#D1D5DB" rx="1.5"/>
    
    <!-- Today's task (blue) -->
    <circle cx="32" cy="72" r="5" fill="white" stroke="#3B82F6" stroke-width="2"/>
    <rect x="44" y="69" width="40" height="3" fill="#3B82F6" rx="1.5"/>
    
    <!-- Expired task (red) -->
    <circle cx="32" cy="86" r="5" fill="white" stroke="#EF4444" stroke-width="2"/>
    <rect x="44" y="83" width="28" height="3" fill="#EF4444" rx="1.5"/>
  </g>
  
  <!-- Today indicator -->
  <circle cx="96" cy="64" r="6" fill="#F59E0B"/>
  <text x="96" y="68" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="white">今</text>
</svg>