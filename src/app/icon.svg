<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="512" height="512">
  <!-- 透明背景 -->
  
  <!-- メインの円形背景（パステルグリーン） -->
  <circle cx="50" cy="50" r="45" fill="#9ED4B4"/>
  
  <!-- 同心円リング（明るいグリーン） -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#B5E0C4" stroke-width="2"/>
  <circle cx="50" cy="50" r="34" fill="none" stroke="#B5E0C4" stroke-width="2"/>
  <circle cx="50" cy="50" r="28" fill="none" stroke="#C5E8D2" stroke-width="2"/>
  <circle cx="50" cy="50" r="22" fill="none" stroke="#C5E8D2" stroke-width="2"/>
  <circle cx="50" cy="50" r="16" fill="none" stroke="#D0ECD8" stroke-width="1.5"/>
  
  <!-- チェックマーク（ダークグリーン） -->
  <polyline 
    points="30,52 44,66 70,38" 
    fill="none" 
    stroke="#2D8B5E" 
    stroke-width="8" 
    stroke-linecap="round" 
    stroke-linejoin="round"
  />
</svg>
