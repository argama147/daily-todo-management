name: 仕様
description: 仕様の追加・変更を提案する
title: "[仕様] "
labels:
  - spec
body:
  - type: textarea
    id: overview
    attributes:
      label: 概要
      description: どのような仕様を追加・変更するか、背景や目的を説明してください
    validations:
      required: true

  - type: textarea
    id: changes
    attributes:
      label: 追加・変更内容
      value: "-"
    validations:
      required: true

  - type: textarea
    id: out_of_scope
    attributes:
      label: 変更しない範囲（スコープ外）
      value: "-"

  - type: textarea
    id: notes
    attributes:
      label: 備考
      description: その他、実装時に考慮すべき事項があれば記載してください
